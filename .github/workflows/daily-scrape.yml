name: Daily Competitor Scrape

on:
  schedule:
    # UTC 01:00 = 北京时间 09:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 仓库 Actions 页面可手动触发

permissions:
  contents: write  # 需要写权限把 products.json commit 回仓库

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/product-helper/data/products.json
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "data: daily scrape $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload products.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: products-json
          path: tools/product-helper/data/products.json
          retention-days: 7
